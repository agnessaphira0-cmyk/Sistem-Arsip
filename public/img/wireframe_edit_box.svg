<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles for standard wireframe look -->
  <style>
    .wireframe-line { stroke: #000000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .wireframe-line-thin { stroke: #000000; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .wireframe-text { font-family: 'Inter', 'Arial', sans-serif; fill: #000000; }
    .wireframe-text-muted { font-family: 'Inter', 'Arial', sans-serif; fill: #666666; }
    .wireframe-text-code { font-family: 'Courier New', Courier, monospace; fill: #000000; }
  </style>

  <!-- Background Canvas -->
  <rect width="1000" height="700" fill="#FFFFFF" />

  <!-- Web Browser Window -->
  <rect x="20" y="20" width="960" height="660" rx="8" class="wireframe-line" />
  <!-- Browser Header Separator -->
  <line x1="20" y1="60" x2="980" y2="60" class="wireframe-line" />
  
  <!-- Browser Window Controls (3 dots) -->
  <circle cx="45" cy="40" r="6" class="wireframe-line-thin" />
  <circle cx="65" cy="40" r="6" class="wireframe-line-thin" />
  <circle cx="85" cy="40" r="6" class="wireframe-line-thin" />

  <!-- Address Bar -->
  <rect x="120" y="30" width="800" height="20" rx="4" class="wireframe-line-thin" />
  <text x="130" y="44" font-size="11" class="wireframe-text-code">http://localhost:8000/box/1/edit</text>

  <!-- ================= SIDEBAR (Left) ================= -->
  <!-- Vertical Divider -->
  <line x1="220" y1="60" x2="220" y2="680" class="wireframe-line" />

  <!-- Sidebar Brand -->
  <!-- Circular Logo Placeholder -->
  <circle cx="120" cy="95" r="18" class="wireframe-line" />
  <line x1="107" y1="82" x2="133" y2="108" class="wireframe-line-thin" />
  <line x1="133" y1="82" x2="107" y2="108" class="wireframe-line-thin" />
  
  <text x="120" y="125" font-size="10" font-weight="bold" text-anchor="middle" class="wireframe-text">SISTEM INFORMASI ARSIP</text>
  <text x="120" y="137" font-size="8" font-weight="bold" text-anchor="middle" class="wireframe-text-muted">PT Bank Sumut</text>
  <!-- Orange Stripe Equivalent (Thicker Line) -->
  <line x1="20" y1="148" x2="220" y2="148" stroke="#000000" stroke-width="3" />

  <!-- Sidebar Navigation -->
  <!-- Section 1: Menu Utama -->
  <text x="35" y="172" font-size="8" font-weight="bold" class="wireframe-text-muted">MENU UTAMA</text>
  
  <!-- Dashboard -->
  <!-- Speedometer Icon -->
  <circle cx="38" cy="195" r="5" class="wireframe-line-thin" />
  <line x1="38" y1="195" x2="41" y2="191" class="wireframe-line-thin" />
  <text x="50" y="198" font-size="10" class="wireframe-text">Dashboard</text>

  <!-- Kelola Rak -->
  <!-- Archive Icon -->
  <rect x="33" y="218" width="10" height="8" rx="1" class="wireframe-line-thin" />
  <line x1="33" y1="222" x2="43" y2="222" class="wireframe-line-thin" />
  <text x="50" y="225" font-size="10" class="wireframe-text">Kelola Rak</text>

  <!-- Kelola Box (Active) -->
  <rect x="25" y="234" width="190" height="26" rx="4" class="wireframe-line-thin" />
  <line x1="25" y1="234" x2="25" y2="260" stroke="#000000" stroke-width="4" />
  <!-- Box Icon -->
  <rect x="33" y="244" width="10" height="8" rx="1.5" class="wireframe-line-thin" />
  <line x1="33" y1="244" x2="38" y2="248" class="wireframe-line-thin" />
  <line x1="43" y1="244" x2="38" y2="248" class="wireframe-line-thin" />
  <text x="50" y="251" font-size="10" font-weight="bold" class="wireframe-text">Kelola Box</text>

  <!-- Kelola Dokumen -->
  <!-- Document Icon -->
  <rect x="34" y="269" width="8" height="10" rx="1" class="wireframe-line-thin" />
  <line x1="36" y1="273" x2="40" y2="273" class="wireframe-line-thin" />
  <line x1="36" y1="276" x2="40" y2="276" class="wireframe-line-thin" />
  <text x="50" y="277" font-size="10" class="wireframe-text">Kelola Dokumen</text>

  <!-- Section 2: Fitur -->
  <text x="35" y="306" font-size="8" font-weight="bold" class="wireframe-text-muted">FITUR</text>
  
  <!-- Cari Dokumen -->
  <!-- Search Icon -->
  <circle cx="37" cy="320" r="3.5" class="wireframe-line-thin" />
  <line x1="39.5" y1="322.5" x2="43" y2="326" class="wireframe-line-thin" />
  <text x="50" y="324" font-size="10" class="wireframe-text">Cari Dokumen</text>

  <!-- Retensi Dokumen -->
  <!-- Clock Icon -->
  <circle cx="38" cy="346" r="4.5" class="wireframe-line-thin" />
  <line x1="38" y1="343" x2="38" y2="346" class="wireframe-line-thin" />
  <line x1="38" y1="346" x2="41" y2="346" class="wireframe-line-thin" />
  <text x="50" y="350" font-size="10" class="wireframe-text">Retensi Dokumen</text>

  <!-- Notifikasi -->
  <!-- Bell Icon -->
  <path d="M 38,370 C 35,370 35,376 35,376 H 41 C 41,376 41,370 38,370 Z" class="wireframe-line-thin" />
  <circle cx="38" cy="377" r="1" class="wireframe-line-thin" />
  <text x="50" y="376" font-size="10" class="wireframe-text">Notifikasi</text>

  <!-- Section 3: Pengaturan -->
  <text x="35" y="405" font-size="8" font-weight="bold" class="wireframe-text-muted">PENGATURAN</text>
  
  <!-- Manajemen User -->
  <!-- Users Icon -->
  <circle cx="35" cy="417" r="2.5" class="wireframe-line-thin" />
  <path d="M 31,424 C 31,421 39,421 39,424" class="wireframe-line-thin" />
  <circle cx="41" cy="417" r="2" class="wireframe-line-thin" />
  <text x="50" y="422" font-size="10" class="wireframe-text">Manajemen User</text>

  <!-- Sidebar Logout -->
  <line x1="20" y1="620" x2="220" y2="620" class="wireframe-line-thin" />
  <rect x="35" y="632" width="150" height="30" rx="6" class="wireframe-line-thin" />
  <!-- Logout icon -->
  <rect x="50" y="642" width="8" height="10" rx="1.5" class="wireframe-line-thin" />
  <path d="M 54,642 H 60 V 652 H 54" class="wireframe-line-thin" />
  <path d="M 52,647 H 57 L 55,645 M 57,647 L 55,649" class="wireframe-line-thin" />
  <text x="105" y="651" font-size="10" font-weight="bold" text-anchor="middle" class="wireframe-text">Logout</text>


  <!-- ================= MAIN CONTENT (Right) ================= -->
  
  <!-- Topbar -->
  <rect x="240" y="80" width="720" height="50" rx="8" class="wireframe-line-thin" />
  <!-- Edit Icon (pencil inside topbar) -->
  <rect x="254" y="96" width="16" height="16" rx="2" class="wireframe-line-thin" />
  <path d="M 260,108 L 267,100 L 269,102 L 262,110 Z" class="wireframe-line-thin" />
  <text x="280" y="112" font-size="13" font-weight="bold" class="wireframe-text">Ubah Informasi Box</text>


  <!-- Card Form (col-md-8 width) -->
  <rect x="240" y="150" width="480" height="400" rx="12" class="wireframe-line-thin" />

  <!-- Form Body -->
  <!-- Field 1: Kode Box -->
  <text x="265" y="188" font-size="11" font-weight="bold" class="wireframe-text">Kode Box</text>
  <rect x="265" y="196" width="430" height="34" rx="6" class="wireframe-line-thin" />
  <text x="277" y="217" font-size="11" class="wireframe-text-code">BOX-001</text>

  <!-- Field 2: Nama Box -->
  <text x="265" y="258" font-size="11" font-weight="bold" class="wireframe-text">Nama Box</text>
  <rect x="265" y="266" width="430" height="34" rx="6" class="wireframe-line-thin" />
  <text x="277" y="287" font-size="11" class="wireframe-text">Box 01 - Kepegawaian</text>

  <!-- Field 3: Pindahkan Lokasi Rak -->
  <text x="265" y="328" font-size="11" font-weight="bold" class="wireframe-text">Pindahkan Lokasi Rak</text>
  <rect x="265" y="336" width="430" height="34" rx="6" class="wireframe-line-thin" />
  <text x="277" y="357" font-size="11" class="wireframe-text">RAK-001 — Ruang Arsip Osa</text>
  <!-- Dropdown Select Arrow -->
  <path d="M 670,350 L 675,356 L 680,350 Z" fill="#000000" />

  <!-- Field 4: Kapasitas Penyimpanan -->
  <text x="265" y="398" font-size="11" font-weight="bold" class="wireframe-text">Kapasitas Penyimpanan</text>
  <rect x="265" y="406" width="430" height="34" rx="6" class="wireframe-line-thin" />
  <text x="277" y="427" font-size="11" class="wireframe-text-code">50</text>

  <!-- Form Action Buttons -->
  <!-- Update Data Button -->
  <rect x="265" y="470" width="130" height="34" rx="6" class="wireframe-line" />
  <!-- Save Icon (diskette) -->
  <rect x="278" y="479" width="14" height="14" rx="2" class="wireframe-line-thin" />
  <line x1="281" y1="479" x2="281" y2="483" class="wireframe-line-thin" />
  <rect x="283" y="485" width="4" height="6" class="wireframe-line-thin" />
  <text x="298" y="491" font-size="11" font-weight="bold" class="wireframe-text">Update Data</text>

  <!-- Cancel Button (Batal) -->
  <rect x="405" y="470" width="80" height="34" rx="6" class="wireframe-line-thin" />
  <text x="445" y="491" font-size="11" font-weight="bold" text-anchor="middle" class="wireframe-text">Batal</text>
</svg>
