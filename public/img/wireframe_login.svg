<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles for standard wireframe look -->
  <style>
    .wireframe-line { stroke: #000000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .wireframe-line-thin { stroke: #000000; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .wireframe-text { font-family: 'Inter', 'Arial', sans-serif; fill: #000000; }
    .wireframe-text-muted { font-family: 'Inter', 'Arial', sans-serif; fill: #777777; }
    .wireframe-text-code { font-family: 'Courier New', Courier, monospace; fill: #000000; }
  </style>

  <!-- Background Canvas -->
  <rect width="800" height="600" fill="#FFFFFF" />

  <!-- Web Browser Window -->
  <rect x="40" y="40" width="720" height="520" rx="8" class="wireframe-line" />
  <!-- Browser Header Separator -->
  <line x1="40" y1="80" x2="760" y2="80" class="wireframe-line" />
  
  <!-- Browser Window Controls (3 dots) -->
  <circle cx="65" cy="60" r="6" class="wireframe-line-thin" />
  <circle cx="85" cy="60" r="6" class="wireframe-line-thin" />
  <circle cx="105" cy="60" r="6" class="wireframe-line-thin" />

  <!-- Address Bar -->
  <rect x="140" y="50" width="580" height="20" rx="4" class="wireframe-line-thin" />
  <text x="150" y="64" font-size="11" class="wireframe-text-code">http://localhost:8000/login</text>

  <!-- Login Card (Centered) -->
  <rect x="220" y="120" width="360" height="400" rx="12" class="wireframe-line" />

  <!-- Card Header -->
  <!-- Circle Logo -->
  <circle cx="400" cy="165" r="24" class="wireframe-line" />
  <!-- Image placeholder symbol (X inside circle) -->
  <line x1="383" y1="148" x2="417" y2="182" class="wireframe-line-thin" />
  <line x1="417" y1="148" x2="383" y2="182" class="wireframe-line-thin" />

  <!-- Title: SISTEM INFORMASI ARSIP -->
  <text x="400" y="212" font-size="15" font-weight="bold" text-anchor="middle" class="wireframe-text">SISTEM INFORMASI ARSIP</text>
  
  <!-- Badge: DIVISI TEKNOLOGI INFORMASI -->
  <rect x="280" y="222" width="240" height="22" rx="11" class="wireframe-line-thin" />
  <!-- Branch icon inside badge -->
  <circle cx="298" cy="233" r="3" class="wireframe-line-thin" />
  <line x1="298" y1="230" x2="298" y2="236" class="wireframe-line-thin" />
  <line x1="298" y1="233" x2="303" y2="230" class="wireframe-line-thin" />
  <text x="412" y="237" font-size="9" font-weight="bold" text-anchor="middle" class="wireframe-text">DIVISI TEKNOLOGI INFORMASI</text>

  <!-- Header Separator Stripe (Wireframe equivalent: thick line) -->
  <line x1="220" y1="258" x2="580" y2="258" stroke="#000000" stroke-width="3" stroke-linecap="round" />

  <!-- Card Body -->
  <!-- Username Label -->
  <text x="250" y="285" font-size="12" font-weight="bold" class="wireframe-text">Username</text>
  <!-- Username Input Group -->
  <rect x="250" y="292" width="300" height="36" rx="6" class="wireframe-line-thin" />
  <!-- Icon divider -->
  <line x1="286" y1="292" x2="286" y2="328" class="wireframe-line-thin" />
  <!-- User icon (silhouette) -->
  <circle cx="268" cy="305" r="4.5" class="wireframe-line-thin" />
  <path d="M 258,320 C 258,314 278,314 278,320" class="wireframe-line-thin" />
  <!-- Username Placeholder text -->
  <text x="296" y="314" font-size="12" class="wireframe-text-muted">Masukkan username</text>

  <!-- Password Label -->
  <text x="250" y="352" font-size="12" font-weight="bold" class="wireframe-text">Password</text>
  <!-- Password Input Group -->
  <rect x="250" y="359" width="300" height="36" rx="6" class="wireframe-line-thin" />
  <!-- Icon divider -->
  <line x1="286" y1="359" x2="286" y2="395" class="wireframe-line-thin" />
  <!-- Lock icon -->
  <rect x="263" y="375" width="10" height="8" rx="1.5" class="wireframe-line-thin" />
  <path d="M 265,375 V 372 C 265,369 271,369 271,372 V 375" class="wireframe-line-thin" />
  <!-- Password Placeholder text -->
  <text x="296" y="381" font-size="12" class="wireframe-text-muted">Masukkan password</text>

  <!-- Login Button (→ Masuk) -->
  <rect x="250" y="415" width="300" height="36" rx="6" class="wireframe-line" />
  <!-- Right Arrow Icon inside button -->
  <line x1="365" y1="433" x2="377" y2="433" class="wireframe-line-thin" />
  <line x1="373" y1="429" x2="377" y2="433" class="wireframe-line-thin" />
  <line x1="373" y1="437" x2="377" y2="433" class="wireframe-line-thin" />
  <!-- Text inside button -->
  <text x="408" y="437" font-size="13" font-weight="bold" text-anchor="middle" class="wireframe-text">Masuk</text>

  <!-- Card Footer Separator -->
  <line x1="220" y1="480" x2="580" y2="480" class="wireframe-line-thin" />
  <!-- Card Footer Text -->
  <text x="400" y="501" font-size="10" font-weight="bold" text-anchor="middle" class="wireframe-text">© 2024 PT Bank Sumut — Sistem Informasi Arsip</text>
</svg>
