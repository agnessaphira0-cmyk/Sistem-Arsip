<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%" style="background-color: #f4f7fa; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e8eb" stroke-width="0.8"/>
    </pattern>
    <style>
      .title-text { font-family: 'Inter', sans-serif; font-weight: 700; fill: #002d54; }
      .normal-text { font-family: 'Inter', sans-serif; fill: #334155; }
      .muted-text { font-family: 'Inter', sans-serif; fill: #64748b; }
      .sidebar-section { font-family: 'Inter', sans-serif; font-weight: 700; fill: #94a3b8; font-size: 10px; letter-spacing: 0.8px; }
      .sidebar-link { font-family: 'Inter', sans-serif; font-weight: 600; fill: #cbd5e1; font-size: 13.5px; }
      .sidebar-link.active { fill: #ffffff; font-weight: 700; }
      .browser-url { font-family: monospace; fill: #334155; font-size: 11px; }
      .browser-title { font-family: 'Inter', sans-serif; font-weight: 500; fill: #475569; font-size: 10px; }
      .wireframe-stroke { stroke: #002d54; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .table-header { font-family: 'Inter', sans-serif; font-weight: 700; fill: #64748b; font-size: 10px; }
      .table-cell { font-family: 'Inter', sans-serif; fill: #334155; font-size: 11.5px; }
      .blade-code { font-family: monospace; fill: #0f172a; font-weight: bold; font-size: 11px; }
      .blade-code-large { font-family: monospace; fill: #002d54; font-weight: bold; font-size: 13px; }
    </style>
  </defs>

  <!-- Draw Grid Background -->
  <rect width="1000" height="700" fill="url(#grid)" />

  <!-- Browser Window Wrapper -->
  <g id="browser-window">
    <rect x="15" y="15" width="970" height="670" rx="8" fill="#ffffff" stroke="#002d54" stroke-width="2.5" />
    <line x1="15" y1="55" x2="985" y2="55" stroke="#002d54" stroke-width="2.5" />
    
    <!-- Window Controls -->
    <circle cx="40" cy="35" r="4.5" class="wireframe-stroke" />
    <circle cx="56" cy="35" r="4.5" class="wireframe-stroke" />
    <circle cx="72" cy="35" r="4.5" class="wireframe-stroke" />
    
    <!-- Browser Tab -->
    <path d="M 95 55 L 105 30 L 245 30 L 255 55 Z" fill="#ffffff" stroke="#002d54" stroke-width="2" />
    <text x="175" y="44" text-anchor="middle" class="browser-title">Dashboard - Sistem Arsip PT Bank Sumut</text>
    <line x1="103.5" y1="54.5" x2="246.5" y2="54.5" stroke="#ffffff" stroke-width="3" />
    
    <!-- Address Bar -->
    <rect x="275" y="27" width="560" height="20" rx="4" class="wireframe-stroke" />
    <path d="M 285 38 L 285 35 A 1.5 1.5 0 0 1 288 35 L 288 38 Z M 283 38 L 290 38 L 290 43 L 283 43 Z" fill="none" stroke="#002d54" stroke-width="1.2" />
    <text x="298" y="41" class="browser-url">http://localhost:8000/dashboard</text>
  </g>

  <!-- Sidebar Component -->
  <g id="sidebar">
    <path d="M 15 55 L 275 55 L 275 685 L 15 685 Z" fill="#002d54" stroke="#002d54" stroke-width="1" />
    
    <!-- Sidebar Brand -->
    <g transform="translate(35, 75)">
      <circle cx="24" cy="24" r="20" fill="#ffffff" stroke="#e06b00" stroke-width="2" />
      <path d="M 24 12 L 34 24 L 24 36 L 14 24 Z" fill="none" stroke="#002d54" stroke-width="1.5" />
      <text x="56" y="20" class="title-text" font-size="12" font-weight="bold" fill="#ffffff">SISTEM INFORMASI ARSIP</text>
      <text x="56" y="34" class="muted-text" font-size="10.5" fill="#94a3b8">PT Bank Sumut</text>
      <line x1="-20" y1="55" x2="240" y2="55" stroke="#e06b00" stroke-width="3" />
    </g>

    <!-- Sidebar Navigation -->
    <g transform="translate(35, 150)">
      <text x="0" y="0" class="sidebar-section">MENU UTAMA</text>
      
      <!-- Dashboard (Active) -->
      <g transform="translate(-20, 10)">
        <path d="M 0 0 L 240 0 L 240 34 L 0 34 Z" fill="#004b87" />
        <line x1="0" y1="0" x2="0" y2="34" stroke="#e06b00" stroke-width="4" />
        <rect x="18" y="10" width="14" height="14" class="wireframe-stroke" stroke="#ffffff" />
        <text x="42" y="22" class="sidebar-link active">Dashboard</text>
      </g>
      
      <!-- Kelola Rak -->
      <g transform="translate(-20, 50)">
        <rect x="18" y="10" width="14" height="14" class="wireframe-stroke" stroke="#94a3b8" />
        <text x="42" y="22" class="sidebar-link">Kelola Rak</text>
      </g>
      
      <!-- Kelola Box -->
      <g transform="translate(-20, 90)">
        <rect x="18" y="10" width="14" height="14" class="wireframe-stroke" stroke="#94a3b8" />
        <text x="42" y="22" class="sidebar-link">Kelola Box</text>
      </g>
      
      <!-- Kelola Dokumen -->
      <g transform="translate(-20, 130)">
        <rect x="18" y="10" width="14" height="14" class="wireframe-stroke" stroke="#94a3b8" />
        <text x="42" y="22" class="sidebar-link">Kelola Dokumen</text>
      </g>

      <!-- Section: FITUR -->
      <text x="0" y="195" class="sidebar-section">FITUR</text>
      
      <!-- Cari Dokumen -->
      <g transform="translate(-20, 205)">
        <circle cx="25" cy="17" r="5" class="wireframe-stroke" stroke="#94a3b8" />
        <line x1="29" y1="21" x2="33" y2="25" stroke="#94a3b8" stroke-width="1.5" />
        <text x="42" y="22" class="sidebar-link">Cari Dokumen</text>
      </g>
      
      <!-- Retensi Dokumen -->
      <g transform="translate(-20, 245)">
        <circle cx="25" cy="17" r="6" class="wireframe-stroke" stroke="#94a3b8" />
        <line x1="25" y1="13" x2="25" y2="17" stroke="#94a3b8" stroke-width="1.2" />
        <line x1="25" y1="17" x2="29" y2="17" stroke="#94a3b8" stroke-width="1.2" />
        <text x="42" y="22" class="sidebar-link">Retensi Dokumen</text>
      </g>
      
      <!-- Notifikasi -->
      <g transform="translate(-20, 285)">
        <path d="M 21 21 L 29 21 A 4 4 0 0 0 25 15 Z" fill="none" stroke="#94a3b8" stroke-width="1.5" />
        <circle cx="25" cy="22" r="1.5" fill="#94a3b8" />
        <text x="42" y="22" class="sidebar-link">Notifikasi</text>
      </g>

      <!-- Section: PENGATURAN -->
      <text x="0" y="350" class="sidebar-section">PENGATURAN</text>
      
      <!-- Manajemen User -->
      <g transform="translate(-20, 360)">
        <rect x="18" y="10" width="14" height="14" class="wireframe-stroke" stroke="#94a3b8" rx="3" />
        <text x="42" y="22" class="sidebar-link">Manajemen User</text>
      </g>
    </g>

    <!-- Logout Button -->
    <g transform="translate(35, 620)">
      <line x1="-20" y1="-10" x2="240" y2="-10" stroke="#004b87" stroke-width="1" />
      <rect x="-10" y="5" width="220" height="40" rx="10" fill="#2d1d24" stroke="#e11d48" stroke-width="1.5" />
      <path d="M 12 25 L 22 25 M 18 21 L 22 25 L 18 29" fill="none" stroke="#f87171" stroke-width="1.5" />
      <text x="36" y="29" class="sidebar-link" font-size="14" fill="#fca5a5" font-weight="bold">Logout</text>
    </g>
  </g>

  <!-- Main Content Wrapper -->
  <g id="main-content" transform="translate(275, 55)">
    
    <!-- Topbar Component with Exact Blade Expressions -->
    <g id="topbar" transform="translate(20, 20)">
      <rect x="0" y="0" width="670" height="68" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
      
      <text x="20" y="28" class="title-text" font-size="16" font-weight="bold">Dashboard</text>
      <text x="20" y="48" class="muted-text" font-size="12">Selamat datang kembali, <tspan font-weight="bold" fill="#0f172a" font-family="monospace">{{ session('admin_nama') }}</tspan>!</text>
      
      <!-- Role Badge and Calendar Date -->
      <g transform="translate(450, 24)">
        <!-- Role badge -->
        <rect x="-15" y="-3" width="165" height="22" rx="11" fill="#004b87" />
        <text x="67.5" y="11" text-anchor="middle" class="blade-code" font-size="9" fill="#ffffff">{{ ucfirst(session('admin_role')) }}</text>
        
        <!-- Date -->
        <rect x="160" y="-1" width="14" height="14" class="wireframe-stroke" stroke="#002d54" />
        <line x1="160" y1="3" x2="174" y2="3" stroke="#002d54" />
        <text x="180" y="11" class="blade-code" font-size="9">{{ now()->isoFormat('dddd, D MMMM Y') }}</text>
      </g>
    </g>

    <!-- Stats Cards Row (with exact counts) -->
    <g id="stats-row" transform="translate(20, 108)">
      <!-- Card 1: Total Rak -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="152" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        <line x1="0" y1="0" x2="152" y2="0" stroke="#004b87" stroke-width="4.5" />
        <text x="16" y="26" class="muted-text" font-size="10.5" font-weight="600">Total Rak</text>
        <text x="16" y="52" class="blade-code-large">{{ \App\Models\Rak::count() }}</text>
        <rect x="110" y="38" width="28" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
      </g>

      <!-- Card 2: Total Box -->
      <g transform="translate(172, 0)">
        <rect x="0" y="0" width="152" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        <line x1="0" y1="0" x2="152" y2="0" stroke="#10b981" stroke-width="4.5" />
        <text x="16" y="26" class="muted-text" font-size="10.5" font-weight="600">Total Box</text>
        <text x="16" y="52" class="blade-code-large" fill="#065f46">{{ \App\Models\Box::count() }}</text>
        <rect x="110" y="38" width="28" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
      </g>

      <!-- Card 3: Total Dokumen -->
      <g transform="translate(344, 0)">
        <rect x="0" y="0" width="152" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        <line x1="0" y1="0" x2="152" y2="0" stroke="#ff7a00" stroke-width="4.5" />
        <text x="16" y="26" class="muted-text" font-size="10.5" font-weight="600">Total Dokumen</text>
        <text x="16" y="52" class="blade-code-large" fill="#c2410c">{{ \App\Models\Dokumen::count() }}</text>
        <rect x="110" y="38" width="28" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
      </g>

      <!-- Card 4: Perlu Dimusnahkan -->
      <g transform="translate(516, 0)">
        <rect x="0" y="0" width="154" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        <line x1="0" y1="0" x2="154" y2="0" stroke="#ef4444" stroke-width="4.5" />
        <text x="14" y="26" class="muted-text" font-size="9.5" font-weight="600">Perlu Dimusnahkan</text>
        <!-- Large Count Expression -->
        <text x="14" y="50" class="blade-code" font-size="9" fill="#991b1b">{{ \App\Models\Retensi::where('status','kadaluarsa')->count() }}</text>
        <rect x="116" y="38" width="28" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
      </g>
    </g>

    <!-- Content Cards Row -->
    <g id="content-row" transform="translate(20, 208)">
      <!-- Left Card: Dokumen Terbaru -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="430" height="400" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        
        <!-- Header -->
        <g transform="translate(20, 15)">
          <rect x="0" y="4" width="12" height="12" class="wireframe-stroke" stroke="#004b87" />
          <text x="22" y="15" class="title-text" font-size="13.5" font-weight="bold">Dokumen Terbaru</text>
          <line x1="-20" y1="25" x2="410" y2="25" stroke="#cbd5e1" stroke-width="1.2" />
        </g>
        
        <!-- Table Area -->
        <g transform="translate(0, 56)">
          <!-- Table Header -->
          <rect x="0" y="0" width="430" height="32" fill="#f8fafc" />
          <line x1="0" y1="32" x2="430" y2="32" stroke="#cbd5e1" stroke-width="1.2" />
          
          <text x="20" y="20" class="table-header">NAMA DOKUMEN</text>
          <text x="175" y="20" class="table-header">KATEGORI</text>
          <text x="270" y="20" class="table-header">JENIS</text>
          <text x="340" y="20" class="table-header">TGL MASUK</text>

          <!-- Rows (containing the loop variables) -->
          <!-- Row 1 -->
          <g transform="translate(0, 32)">
            <text x="20" y="22" class="blade-code">{{ $dok->nama_dokumen }}</text>
            <text x="175" y="22" class="blade-code" fill="#64748b">{{ $dok->kategori }}</text>
            <!-- Badge -->
            <rect x="270" y="10" width="60" height="16" rx="4" fill="none" stroke="#cbd5e1" stroke-width="0.8" />
            <text x="300" y="21" text-anchor="middle" class="blade-code" font-size="9" fill="#0369a1">{{ ucfirst($dok->jenis) }}</text>
            <text x="340" y="22" class="blade-code" font-size="8.5">{{ \Carbon\Carbon::parse($dok->tgl_masuk)->format('d/m/Y') }}</text>
            <line x1="0" y1="38" x2="430" y2="38" stroke="#cbd5e1" stroke-width="0.8" />
          </g>

          <!-- Empty template illustration line -->
          <g transform="translate(0, 100)">
            <text x="215" y="40" text-anchor="middle" class="muted-text" font-size="11" font-style="italic">@forelse(\App\Models\Dokumen::latest()->take(5)->get() as $dok)</text>
            <text x="215" y="65" text-anchor="middle" class="muted-text" font-size="11" font-style="italic">... @empty ... Belum ada dokumen baru</text>
          </g>
        </g>
      </g>

      <!-- Right Card: Notifikasi Retensi -->
      <g transform="translate(450, 0)">
        <rect x="0" y="0" width="220" height="400" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        
        <!-- Header -->
        <g transform="translate(18, 15)">
          <path d="M 4 14 L 12 14 A 4 4 0 0 0 8 8 Z" fill="none" stroke="#ef4444" stroke-width="1.5" />
          <circle cx="8" cy="15" r="1.5" fill="#ef4444" />
          <text x="22" y="15" class="title-text" font-size="13.5" font-weight="bold">Notifikasi Retensi</text>
          <line x1="-18" y1="25" x2="202" y2="25" stroke="#cbd5e1" stroke-width="1.2" />
        </g>

        <!-- Notification List with Blade tags -->
        <g transform="translate(0, 56)">
          <g transform="translate(0, 0)">
            <text x="16" y="20" class="blade-code" font-size="9.5">{{ $notif->pesan }}</text>
            <rect x="16" y="27" width="8" height="8" class="wireframe-stroke" stroke="#64748b" />
            <text x="28" y="34" class="blade-code" font-size="8">{{ \Carbon\Carbon::parse($notif->tgl_notif)->diffForHumans() }}</text>
            <line x1="0" y1="46" x2="220" y2="46" stroke="#cbd5e1" stroke-width="0.8" />
          </g>

          <g transform="translate(0, 80)">
            <text x="110" y="30" text-anchor="middle" class="muted-text" font-size="10" font-style="italic">@forelse(\App\Models\Notifikasi::...</text>
            <text x="110" y="50" text-anchor="middle" class="muted-text" font-size="10" font-style="italic">@empty ... Tidak ada notifikasi baru</text>
          </g>

          <g transform="translate(0, 280)">
            <line x1="0" y1="-10" x2="220" y2="-10" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2" />
            <text x="110" y="22" text-anchor="middle" class="muted-text" font-size="12" font-style="italic">Lihat Semua Notifikasi</text>
            <rect x="40" y="35" width="140" height="26" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2" />
            <text x="110" y="51" text-anchor="middle" class="normal-text" font-size="11" font-weight="bold">Buka Notifikasi</text>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
