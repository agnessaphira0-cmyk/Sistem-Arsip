<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #f7f9fa; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Grid pattern for drafting background -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e9ebec" stroke-width="0.6"/>
    </pattern>
    <style>
      .title-text { font-family: 'Inter', sans-serif; font-weight: 700; fill: #002d54; font-size: 16px; letter-spacing: 0.5px; }
      .badge-text { font-family: 'Inter', sans-serif; font-weight: 600; fill: #e06b00; font-size: 10.5px; letter-spacing: 0.8px; }
      .label-text { font-family: 'Inter', sans-serif; font-weight: 600; fill: #1e293b; font-size: 13.5px; }
      .placeholder-text { font-family: 'Inter', sans-serif; fill: #64748b; font-size: 14px; }
      .button-text { font-family: 'Inter', sans-serif; font-weight: 600; fill: #ffffff; font-size: 15px; }
      .footer-text { font-family: 'Inter', sans-serif; font-weight: 500; fill: #475569; font-size: 11.5px; }
      .browser-url { font-family: monospace; fill: #334155; font-size: 11px; }
      .browser-title { font-family: 'Inter', sans-serif; font-weight: 500; fill: #475569; font-size: 10px; }
      .wireframe-stroke { stroke: #002d54; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thick-stroke { stroke: #002d54; stroke-width: 2.5; fill: none; }
      .building-line { stroke: #cbd5e1; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <!-- Draw Grid Background -->
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Background Sketch: Simplified wireframe of Bank Sumut head office building (Gedung Pusat Bank Sumut) -->
  <g id="building-background">
    <rect x="60" y="80" width="120" height="480" class="building-line" />
    <line x1="60" y1="120" x2="180" y2="120" class="building-line" />
    <line x1="60" y1="160" x2="180" y2="160" class="building-line" />
    <line x1="60" y1="200" x2="180" y2="200" class="building-line" />
    <line x1="60" y1="240" x2="180" y2="240" class="building-line" />
    <line x1="60" y1="280" x2="180" y2="280" class="building-line" />
    <line x1="60" y1="320" x2="180" y2="320" class="building-line" />
    <line x1="60" y1="360" x2="180" y2="360" class="building-line" />
    <line x1="60" y1="400" x2="180" y2="400" class="building-line" />
    <line x1="60" y1="440" x2="180" y2="440" class="building-line" />
    <line x1="60" y1="480" x2="180" y2="480" class="building-line" />
    <line x1="60" y1="520" x2="180" y2="520" class="building-line" />
    <line x1="90" y1="80" x2="90" y2="560" class="building-line" />
    <line x1="120" y1="80" x2="120" y2="560" class="building-line" />
    <line x1="150" y1="80" x2="150" y2="560" class="building-line" />

    <rect x="620" y="80" width="120" height="480" class="building-line" />
    <line x1="620" y1="120" x2="740" y2="120" class="building-line" />
    <line x1="620" y1="160" x2="740" y2="160" class="building-line" />
    <line x1="620" y1="200" x2="740" y2="200" class="building-line" />
    <line x1="620" y1="240" x2="740" y2="240" class="building-line" />
    <line x1="620" y1="280" x2="740" y2="280" class="building-line" />
    <line x1="620" y1="320" x2="740" y2="320" class="building-line" />
    <line x1="620" y1="360" x2="740" y2="360" class="building-line" />
    <line x1="620" y1="400" x2="740" y2="400" class="building-line" />
    <line x1="620" y1="440" x2="740" y2="440" class="building-line" />
    <line x1="620" y1="480" x2="740" y2="480" class="building-line" />
    <line x1="620" y1="520" x2="740" y2="520" class="building-line" />
    <line x1="650" y1="80" x2="650" y2="560" class="building-line" />
    <line x1="680" y1="80" x2="680" y2="560" class="building-line" />
    <line x1="710" y1="80" x2="710" y2="560" class="building-line" />
  </g>

  <!-- Browser Window Wrapper -->
  <g id="browser-window">
    <rect x="30" y="25" width="740" height="550" rx="8" fill="#ffffff" fill-opacity="0.9" stroke="#002d54" stroke-width="2.5" />
    <line x1="30" y1="65" x2="770" y2="65" stroke="#002d54" stroke-width="2.5" />
    
    <!-- Window Controls -->
    <circle cx="55" cy="45" r="4.5" class="wireframe-stroke" />
    <circle cx="71" cy="45" r="4.5" class="wireframe-stroke" />
    <circle cx="87" cy="45" r="4.5" class="wireframe-stroke" />
    
    <!-- Browser Tab -->
    <path d="M 110 65 L 120 40 L 260 40 L 270 65 Z" fill="#ffffff" stroke="#002d54" stroke-width="2" />
    <text x="195" y="55" text-anchor="middle" class="browser-title">Login - Sistem Arsip PT Bank Sumut</text>
    <line x1="118.5" y1="64.5" x2="261.5" y2="64.5" stroke="#ffffff" stroke-width="3" />
    
    <!-- Address Bar -->
    <rect x="290" y="37" width="450" height="20" rx="4" class="wireframe-stroke" />
    <path d="M 302 48 L 302 45 A 1.5 1.5 0 0 1 305 45 L 305 48 Z M 300 48 L 307 48 L 307 53 L 300 53 Z" fill="none" stroke="#002d54" stroke-width="1.2" />
    <text x="315" y="51" class="browser-url">http://localhost:8000/login</text>
  </g>

  <!-- Login Card (Centered) -->
  <g id="login-card" transform="translate(190, 80)">
    <rect x="0" y="0" width="420" height="470" rx="20" fill="#ffffff" stroke="#002d54" stroke-width="2.5" />
    
    <!-- Card Header -->
    <path d="M 0 20 A 20 20 0 0 1 20 0 L 400 0 A 20 20 0 0 1 420 20 L 420 155 L 0 155 Z" fill="#f8fafc" stroke="#002d54" stroke-width="2.5" />
    
    <!-- Logo Placeholder -->
    <circle cx="210" cy="50" r="24" fill="#ffffff" stroke="#002d54" stroke-width="2" />
    <path d="M 210 35 L 223 50 L 210 65 L 197 50 Z" fill="none" stroke="#002d54" stroke-width="1.8" />
    <path d="M 210 40 L 218 50 L 210 60 L 202 50 Z" fill="none" stroke="#e06b00" stroke-width="1.2" />
    
    <!-- Title: SISTEM INFORMASI ARSIP -->
    <text x="210" y="100" text-anchor="middle" class="title-text">SISTEM INFORMASI ARSIP</text>
    
    <!-- Division Badge (Divisi Teknologi Informasi) -->
    <g transform="translate(210, 115)">
      <rect x="-95" y="0" width="190" height="20" rx="10" fill="#fff3e0" stroke="#e06b00" stroke-width="1.2" />
      <path d="M -80 10 L -76 10 M -78 6 L -78 14 M -78 10 L -73 6" fill="none" stroke="#e06b00" stroke-width="1.2" />
      <text x="5" y="14" text-anchor="middle" class="badge-text">DIVISI TEKNOLOGI INFORMASI</text>
    </g>
    
    <!-- Thick Line representing Orange Accent -->
    <line x1="0" y1="155" x2="420" y2="155" stroke="#e06b00" stroke-width="4.5" />

    <!-- Card Body -->
    <g id="card-body" transform="translate(32, 185)">
      <!-- Username Field -->
      <g id="username-group" transform="translate(0, 0)">
        <text x="0" y="0" class="label-text">Username</text>
        <g transform="translate(0, 8)">
          <rect x="0" y="0" width="42" height="38" rx="10" fill="#f1f5f9" stroke="#002d54" stroke-width="1.5" />
          <path d="M 0 10 A 10 10 0 0 1 10 0 L 42 0 L 42 38 L 10 38 A 10 10 0 0 1 0 28 Z" fill="#f1f5f9" />
          
          <rect x="42" y="0" width="314" height="38" rx="10" fill="#ffffff" stroke="#002d54" stroke-width="1.5" />
          <path d="M 42 0 L 346 0 A 10 10 0 0 1 356 10 L 356 28 A 10 10 0 0 1 346 38 L 42 38 Z" fill="#ffffff" />
          <line x1="42" y1="0" x2="42" y2="38" stroke="#002d54" stroke-width="1.5" />
          
          <circle cx="21" cy="15" r="4.5" fill="none" stroke="#002d54" stroke-width="1.5" />
          <path d="M 14 25 A 7 7 0 0 1 28 25 Z" fill="none" stroke="#002d54" stroke-width="1.5" />
          
          <text x="56" y="24" class="placeholder-text">Masukkan username</text>
        </g>
      </g>
      
      <!-- Password Field -->
      <g id="password-group" transform="translate(0, 75)">
        <text x="0" y="0" class="label-text">Password</text>
        <g transform="translate(0, 8)">
          <rect x="0" y="0" width="42" height="38" rx="10" fill="#f1f5f9" stroke="#002d54" stroke-width="1.5" />
          <path d="M 0 10 A 10 10 0 0 1 10 0 L 42 0 L 42 38 L 10 38 A 10 10 0 0 1 0 28 Z" fill="#f1f5f9" />
          
          <rect x="42" y="0" width="314" height="38" rx="10" fill="#ffffff" stroke="#002d54" stroke-width="1.5" />
          <path d="M 42 0 L 346 0 A 10 10 0 0 1 356 10 L 356 28 A 10 10 0 0 1 346 38 L 42 38 Z" fill="#ffffff" />
          <line x1="42" y1="0" x2="42" y2="38" stroke="#002d54" stroke-width="1.5" />
          
          <rect x="16" y="16" width="10" height="8" rx="1" fill="none" stroke="#002d54" stroke-width="1.5" />
          <path d="M 18 16 L 18 13 A 3 3 0 0 1 24 13 L 24 16" fill="none" stroke="#002d54" stroke-width="1.5" />
          
          <text x="56" y="24" class="placeholder-text">Masukkan password</text>
        </g>
      </g>
      
      <!-- Login Button (Submit) -->
      <g id="login-button-group" transform="translate(0, 150)">
        <rect x="0" y="0" width="356" height="42" rx="10" fill="#e06b00" stroke="#002d54" stroke-width="2" />
        <g transform="translate(142, 12)">
          <rect x="0" y="0" width="12" height="16" fill="none" stroke="#ffffff" stroke-width="1.8" />
          <line x1="6" y1="0" x2="6" y2="4" stroke="#ffffff" stroke-width="1.5" />
          <line x1="6" y1="12" x2="6" y2="16" stroke="#ffffff" stroke-width="1.5" />
          <path d="M -4 8 L 4 8 M 1 5 L 4 8 L 1 11" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <text x="22" y="13" class="button-text">Masuk</text>
        </g>
      </g>
    </g>
    
    <!-- Card Footer -->
    <g id="card-footer" transform="translate(0, 422)">
      <path d="M 0 0 L 420 0 L 420 28 A 20 20 0 0 1 400 48 L 20 48 A 20 20 0 0 1 0 28 Z" fill="#f8fafc" stroke="#002d54" stroke-width="1.5" />
      <line x1="0" y1="0" x2="420" y2="0" stroke="#cbd5e1" stroke-width="1" />
      
      <!-- Exact Text from Blade -->
      <text x="210" y="28" text-anchor="middle" class="footer-text">&amp;copy; {{ date('Y') }} PT Bank Sumut — Sistem Informasi Arsip</text>
    </g>
  </g>
</svg>
